name: CI MyLibrary
on:
  push:
    branches: [develop, "feature/**"]
  pull_request:
    branches: [main, develop]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven
      - run: cd backend && mvn verify --no-transfer-progress