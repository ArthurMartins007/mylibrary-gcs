<div class="container">
  <h2>Catálogo de Livros</h2>

  <div class="filtros" style="margin-bottom: 20px; padding: 15px; border: 1px solid #ccc; border-radius: 5px;">
    <h4>Filtrar Livros</h4>

    <input type="text" placeholder="Buscar por título ou autor..."
           [(ngModel)]="termoBusca" (input)="filtrar()" style="margin-right: 10px;">

    <select [(ngModel)]="categoriaSelecionada" (change)="filtrar()" style="margin-right: 10px;">
      <option value="">Todas as Categorias</option>
      <option *ngFor="let cat of categorias" [value]="cat.id">{{ cat.nome }}</option>
    </select>

    <select [(ngModel)]="statusSelecionado" (change)="filtrar()">
      <option value="">Todos os Status</option>
      <option value="DISPONIVEL">Disponível</option>
      <option value="EMPRESTADO">Emprestado</option>
    </select>
  </div>

  <button routerLink="/livros/novo" style="margin-bottom: 15px; padding: 10px; background-color: #0056b3; color: white; border: none; border-radius: 4px; cursor: pointer;">
    + Novo Livro
  </button>

  <button routerLink="/emprestimos/novo" style="margin-bottom: 15px; margin-left: 10px; padding: 10px; background-color: #ffc107; color: black; border: none; border-radius: 4px; cursor: pointer;">
    Registrar Empréstimo
  </button>
  <button routerLink="/categorias" style="margin-bottom: 15px; margin-left: 10px; padding: 10px; background-color: #17a2b8; color: white; border: none; border-radius: 4px; cursor: pointer;">
    Gerenciar Categorias
  </button>

  <table border="1" width="100%" style="border-collapse: collapse; text-align: left;">
    <thead>
    <tr style="background-color: #f2f2f2;">
      <th>ID</th>
      <th>Título</th>
      <th>Autor</th>
      <th>Categoria</th>
      <th>Status</th>
      <th>Ações</th>
    </tr>
    </thead>
    <tbody>
    <tr *ngFor="let livro of livrosFiltrados">
      <td>{{ livro.id }}</td>
      <td>{{ livro.titulo }}</td>
      <td>{{ livro.autor }}</td>
      <td>{{ livro.categoria?.nome }}</td>
      <td>{{ livro.status }}</td>
      <td>
      <td>
        <button *ngIf="livro.status === 'EMPRESTADO'" (click)="devolver(livro)" style="color: blue; margin-right: 10px;">Devolver</button>
        <button (click)="excluir(livro)" style="color: red;">Excluir</button>
      </td>
    </tr>
    <tr *ngIf="livrosFiltrados.length === 0">
      <td colspan="6" style="text-align: center;">Nenhum livro encontrado.</td>
    </tr>
    </tbody>
  </table>
</div>
