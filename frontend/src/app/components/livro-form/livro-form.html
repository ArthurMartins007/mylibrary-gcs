<div class="container" style="max-width: 600px; margin: 0 auto; padding-top: 20px;">
  <h2>Cadastrar Novo Livro</h2>

  <div style="display: flex; flex-direction: column; gap: 15px; margin-top: 20px;">

    <div>
      <label style="font-weight: bold;">Título do Livro:</label><br>
      <input type="text" [(ngModel)]="livro.titulo" placeholder="Ex: O Senhor dos Anéis"
             style="width: 100%; padding: 8px; margin-top: 5px;">
    </div>

    <div>
      <label style="font-weight: bold;">Autor:</label><br>
      <input type="text" [(ngModel)]="livro.autor" placeholder="Ex: J.R.R. Tolkien"
             style="width: 100%; padding: 8px; margin-top: 5px;">
    </div>

    <div>
      <label style="font-weight: bold;">Categoria:</label><br>
      <select [(ngModel)]="livro.categoria.id" style="width: 100%; padding: 8px; margin-top: 5px;">
        <option [ngValue]="null">Selecione uma categoria...</option>
        <option *ngFor="let cat of categorias" [value]="cat.id">{{ cat.nome }}</option>
      </select>
    </div>

    <div style="display: flex; gap: 10px; margin-top: 20px;">
      <button (click)="salvar()"
              style="padding: 10px 20px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer;">
        Salvar Livro
      </button>

      <button routerLink="/livros"
              style="padding: 10px 20px; background-color: #6c757d; color: white; border: none; border-radius: 4px; cursor: pointer;">
        Cancelar
      </button>
    </div>

  </div>
</div>
