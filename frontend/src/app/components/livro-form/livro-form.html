<div class="container-acervo form-page">
  <div class="form-card">

    <div class="form-header">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
      <h2>Cadastrar Novo Livro</h2>
    </div>

    <div class="form-content">
      <div class="form-group">
        <label>Título do Livro</label>
        <input type="text" [(ngModel)]="livro.titulo" placeholder="Ex: O Nome do Vento" class="input-modern">
      </div>

      <div class="form-group">
        <label>Autor</label>
        <input type="text" [(ngModel)]="livro.autor" placeholder="Ex: Patrick Rothfuss" class="input-modern">
      </div>

      <div class="form-group">
        <label>Categoria</label>
        <select [(ngModel)]="livro.categoria.id" class="input-modern">
          <option [ngValue]="null">Selecione uma categoria...</option>
          <option *ngFor="let cat of categorias" [ngValue]="cat.id">{{ cat.nome }}</option>
        </select>
      </div>

      <div class="form-actions">
        <button (click)="salvar()" class="btn-action">Salvar Livro</button>
        <button routerLink="/livros" class="btn-cancel">Cancelar</button>
      </div>
    </div>

  </div>
</div>
