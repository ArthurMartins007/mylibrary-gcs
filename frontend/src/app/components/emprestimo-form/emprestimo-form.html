<div class="container-acervo form-page">
  <div class="form-card">

    <div class="form-header">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <h2>Registrar Empréstimo</h2>
    </div>

    <div class="form-content">

      <div class="form-group">
        <label>Livro</label>
        <select [(ngModel)]="emprestimo.livro.id" class="input-modern">
          <option [ngValue]="null">Selecione um livro disponível...</option>
          <option *ngFor="let livro of livrosDisponiveis" [ngValue]="livro.id">{{ livro.titulo }}</option>
        </select>
      </div>

      <div class="form-group">
        <label>Nome do Usuário</label>
        <input type="text" [(ngModel)]="emprestimo.nomeUsuario" placeholder="Ex: Arthur Martins" class="input-modern">
      </div>

      <div class="form-actions">
        <button (click)="salvar()" class="btn-action">Confirmar Empréstimo</button>
        <button routerLink="/livros" class="btn-cancel">Cancelar</button>
      </div>

    </div>
  </div>
</div>
