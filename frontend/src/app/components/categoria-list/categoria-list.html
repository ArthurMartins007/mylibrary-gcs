<div class="container" style="max-width: 800px; margin: 0 auto; padding-top: 20px;">
  <h2>Gerenciar Categorias</h2>

  <div style="margin-bottom: 20px; padding: 15px; border: 1px solid #ccc; border-radius: 5px; display: flex; gap: 10px;">
    <input type="text" [(ngModel)]="novaCategoria.nome" placeholder="Nome da nova categoria..."
           style="flex: 1; padding: 8px;">
    <button (click)="salvar()" style="padding: 8px 15px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer;">
      + Adicionar
    </button>
  </div>

  <table border="1" width="100%" style="border-collapse: collapse; text-align: left;">
    <tr style="background-color: #f2f2f2;">
      <th style="padding: 8px;">ID</th>
      <th style="padding: 8px;">Nome</th>
      <th style="padding: 8px;">Ações</th>
    </tr>
    <tr *ngFor="let cat of categorias">
      <td style="padding: 8px;">{{ cat.id }}</td>
      <td style="padding: 8px;">{{ cat.nome }}</td>
      <td style="padding: 8px;">
        <button (click)="excluir(cat)" style="color: red; cursor: pointer; border: none; background: none; text-decoration: underline;">
          Excluir
        </button>
      </td>
    </tr>
    <tr *ngIf="categorias.length === 0">
      <td colspan="3" style="text-align: center; padding: 15px;">Nenhuma categoria encontrada.</td>
    </tr>
  </table>
</div>
