<div class="container-acervo" style="padding-top: 40px;">

  <div class="category-header">
    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2H2v10l9.29 9.29c.94.94 2.48.94 3.42 0l6.58-6.58c.94-.94.94-2.48 0-3.42L12 2Z"/><path d="M7 7h.01"/></svg>
    <h2>Categorias</h2>
  </div>

  <div class="add-category-box">
    <input type="text" [(ngModel)]="novaCategoria.nome" placeholder="Nome da nova categoria..." class="input-search flex-1">
    <button (click)="salvar()" class="btn-action">
      + Adicionar
    </button>
  </div>

  <div class="categories-grid">
    <div *ngFor="let cat of categorias" class="category-card">

      <div class="category-info">
        <h3>{{ cat.nome }}</h3>
        <p class="muted-text">ID: {{ cat.id }}</p>
      </div>

      <div class="category-actions">
        <button (click)="excluir(cat)" class="btn-icon btn-excluir" title="Excluir">Excluir</button>

        <div class="icon-circle">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
        </div>
      </div>

    </div>

    <div *ngIf="categorias.length === 0" class="empty-state">
      Nenhuma categoria cadastrada ainda.
    </div>
  </div>

</div>
